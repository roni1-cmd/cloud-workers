name = "mom-system"
main = "src/lib.rs"
compatibility_date = "2024-03-17"

# Metadata storage
[[kv_namespaces]]
binding = "MOM_METADATA"
id = "YOUR_KV_NAMESPACE_ID"

# Binary file storage
[[r2_buckets]]
binding = "MOM_ATTACHMENTS"
bucket_name = "meeting-files"

[build]
command = "cargo install -q worker-build && worker-build --release"
